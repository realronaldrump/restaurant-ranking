name: Feature request
description: Suggest an improvement for Big Beautiful
title: "Idea: "
labels:
  - enhancement
body:
  - type: textarea
    id: need
    attributes:
      label: What dining-ledger need would this solve?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like Big Beautiful to do?
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have not included personal dining records or other sensitive information.
          required: true
