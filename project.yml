name: Big Beautiful Restaurant Log
options:
  bundleIdPrefix: com.davis
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "2.0"
    CURRENT_PROJECT_VERSION: 6
    DEVELOPMENT_TEAM: CZ3N26YJ75
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SUPPORTS_MACCATALYST: NO
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Big Beautiful Restaurant Log:
    type: application
    platform: iOS
    sources:
      - path: RestaurantLog
    resources:
      - path: RestaurantLog/Resources
    info:
      path: RestaurantLog/Resources/Info.plist
      properties:
        CFBundleDisplayName: Big Beautiful Restaurant Log
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CKSharingSupported: true
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.davis.bigbeautiful.backup
            UTTypeDescription: Big Beautiful Restaurant Log Backup
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - bbrlog
                - bigbeautiful
              public.mime-type:
                - application/vnd.bigbeautiful.backup+json
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: Your location helps find nearby restaurants while you log a meal. It is never tracked in the background.
        NSPhotoLibraryUsageDescription: Photo access lets you attach meal photos and privately rebuild your dining history.
        UIApplicationSupportsIndirectInputEvents: true
        UIBackgroundModes:
          - remote-notification
        UIDesignRequiresCompatibility: true
        UILaunchScreen:
          UIColorName: Paper
    entitlements:
      path: RestaurantLog/Resources/RestaurantLog.entitlements
      properties:
        aps-environment: development
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.davis.bigbeautifulranking
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davis.bigbeautifulranking
        PRODUCT_NAME: Big Beautiful Restaurant Log
        PRODUCT_MODULE_NAME: RestaurantLog
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_FILE: RestaurantLog/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - sdk: CoreData.framework
      - sdk: CloudKit.framework
      - sdk: MapKit.framework
      - sdk: PhotosUI.framework
      - sdk: Photos.framework
  RestaurantLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RestaurantLogTests
    dependencies:
      - target: Big Beautiful Restaurant Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davis.bigbeautifulranking.tests
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        GENERATE_INFOPLIST_FILE: YES
  RestaurantLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RestaurantLogUITests
    dependencies:
      - target: Big Beautiful Restaurant Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davis.bigbeautifulranking.uitests
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Big Beautiful Restaurant Log
schemes:
  Big Beautiful Restaurant Log:
    build:
      targets:
        Big Beautiful Restaurant Log: all
        RestaurantLogTests: [test]
        RestaurantLogUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - RestaurantLogTests
        - RestaurantLogUITests
