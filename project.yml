name: BigBeautiful
options:
  bundleIdPrefix: com.davis
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SUPPORTS_MACCATALYST: NO
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  BigBeautiful:
    type: application
    platform: iOS
    sources:
      - path: BigBeautiful
    resources:
      - path: BigBeautiful/Resources
    info:
      path: BigBeautiful/Resources/Info.plist
      properties:
        CFBundleDisplayName: Big Beautiful
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: Your location helps find nearby restaurants while you log a meal. It is never tracked in the background.
        NSPhotoLibraryUsageDescription: Photo access lets you attach meal photos and privately rebuild your dining history.
        UIApplicationSupportsIndirectInputEvents: true
        UIBackgroundModes:
          - remote-notification
        UILaunchScreen:
          UIColorName: Paper
    entitlements:
      path: BigBeautiful/Resources/BigBeautiful.entitlements
      properties:
        aps-environment: development
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.davis.bigbeautifulranking
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davis.bigbeautifulranking
        PRODUCT_NAME: BigBeautiful
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_FILE: BigBeautiful/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - sdk: CoreData.framework
      - sdk: CloudKit.framework
      - sdk: MapKit.framework
      - sdk: PhotosUI.framework
      - sdk: Photos.framework
  BigBeautifulTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BigBeautifulTests
    dependencies:
      - target: BigBeautiful
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davis.bigbeautifulranking.tests
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        GENERATE_INFOPLIST_FILE: YES
  BigBeautifulUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BigBeautifulUITests
    dependencies:
      - target: BigBeautiful
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davis.bigbeautifulranking.uitests
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: BigBeautiful
schemes:
  BigBeautiful:
    build:
      targets:
        BigBeautiful: all
        BigBeautifulTests: [test]
        BigBeautifulUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BigBeautifulTests
        - BigBeautifulUITests
